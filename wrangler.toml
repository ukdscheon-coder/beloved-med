name = "beloved-med"
main = "src/index.js"
compatibility_date = "2026-07-14"

[build]
command = "npm run build"

[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = [ "/api/*" ]

[vars]
STRIPE_MODE = "subscription"
STRIPE_ALLOW_PROMOTION_CODES = "true"
